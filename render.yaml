services:
  - type: web
    name: climate-monitor-wiki
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api_server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.1
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_TEMPERATURE
        value: "0.2"
      - key: WIKI_DIR
        value: wiki
      - key: SOURCE_DIR
        value: sources
      - key: OPENAI_API_KEY
        sync: false
      - key: RELOAD_TOKEN
        generateValue: true
