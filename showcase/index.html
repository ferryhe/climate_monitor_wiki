<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Climate Monitor Wiki Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/showcase/styles.css" />
  </head>
  <body>
    <main class="workspace">
      <section class="chat-shell" aria-label="Climate Monitor Wiki Agent chat">
        <header class="app-header">
          <div>
            <p class="eyebrow">Climate Monitor Wiki Agent</p>
            <h1>气候风险 Wiki 对话助手</h1>
          </div>
          <div id="connectionStatus" class="status-pill">连接中</div>
        </header>

        <section id="messages" class="message-list" aria-live="polite"></section>

        <form id="chatForm" class="composer">
          <label class="sr-only" for="messageInput">输入问题</label>
          <textarea
            id="messageInput"
            name="message"
            rows="2"
            placeholder="问一个关于气候风险、巨灾保险、IFRS S2、IAIS 或精算研究的问题..."
          ></textarea>
          <button id="sendButton" type="submit">发送</button>
        </form>
      </section>

      <aside class="context-shell" aria-label="Wiki context">
        <img
          class="context-image"
          src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e?auto=format&fit=crop&w=1200&q=80"
          alt="Mountain lake landscape"
        />

        <section class="context-section">
          <div class="section-heading">
            <h2>检索证据</h2>
            <span id="sourceCount">0</span>
          </div>
          <div id="sourceList" class="source-list">
            <p class="muted">回答后会在这里列出引用的 wiki 页面。</p>
          </div>
        </section>

        <section class="context-section">
          <div class="section-heading">
            <h2>Wiki 页面</h2>
            <span id="wikiStats">加载中</span>
          </div>
          <input
            id="wikiSearch"
            class="wiki-search"
            type="search"
            placeholder="搜索页面或主题"
          />
          <div id="wikiList" class="wiki-list"></div>
        </section>

        <section class="context-section context-section--preview">
          <div class="section-heading">
            <h2>当前上下文</h2>
            <button id="clearContextButton" type="button">清除</button>
          </div>
          <p id="activeContext" class="active-context">未指定页面</p>
          <pre id="markdownPreview" class="markdown-preview">选择一个 wiki 页面后，机器人会优先参考它。</pre>
        </section>
      </aside>
    </main>

    <script src="/showcase/app.js"></script>
  </body>
</html>
