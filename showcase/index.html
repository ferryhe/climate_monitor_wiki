<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Climate Monitor Wiki Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/showcase/styles.css" />
  </head>
  <body>
    <main class="workspace">
      <section class="chat-shell" aria-label="Climate Monitor Wiki Agent chat">
        <header class="app-header">
          <div>
            <p class="eyebrow">Climate Monitor Wiki Agent</p>
            <h1>Climate Risk Wiki Chat</h1>
          </div>
          <div id="connectionStatus" class="status-pill">Connecting</div>
        </header>

        <section id="messages" class="message-list" aria-live="polite"></section>

        <form id="chatForm" class="composer">
          <label class="sr-only" for="messageInput">Ask a question</label>
          <textarea
            id="messageInput"
            name="message"
            rows="2"
            placeholder="Ask about climate risk, nat-cat insurance, IFRS S2, IAIS, or actuarial research..."
          ></textarea>
          <button id="sendButton" type="submit">Send</button>
        </form>
      </section>

      <aside class="context-shell" aria-label="Wiki context">
        <img
          class="context-image"
          src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e?auto=format&fit=crop&w=1200&q=80"
          alt="Mountain lake landscape"
        />

        <section class="context-section">
          <div class="section-heading">
            <h2>Evidence</h2>
            <span id="sourceCount">0</span>
          </div>
          <div id="sourceList" class="source-list">
            <p class="muted">Cited wiki pages will appear here after an answer.</p>
          </div>
        </section>

        <section class="context-section">
          <div class="section-heading">
            <h2>Wiki Pages</h2>
            <span id="wikiStats">Loading</span>
          </div>
          <input
            id="wikiSearch"
            class="wiki-search"
            type="search"
            placeholder="Search pages or topics"
          />
          <div id="wikiList" class="wiki-list"></div>
        </section>

        <section class="context-section context-section--preview">
          <div class="section-heading">
            <h2>Active Context</h2>
            <button id="clearContextButton" type="button">Clear</button>
          </div>
          <p id="activeContext" class="active-context">No page selected</p>
          <pre id="markdownPreview" class="markdown-preview">Select a wiki page to prioritize it during retrieval.</pre>
        </section>
      </aside>
    </main>

    <script src="/showcase/app.js"></script>
  </body>
</html>
